<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="theme-color" content="#0f1117"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Scadenze Deli"/>
<meta name="description" content="Gestione scadenze prodotti per negozi retail e deli"/>

<!-- PWA Manifest inline via JS -->
<link rel="manifest" href="#" id="manifest-placeholder"/>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --card: #20243a;
  --border: #2a2f4a;
  --accent: #f97316;
  --accent2: #fb923c;
  --green: #22c55e;
  --yellow: #eab308;
  --red: #ef4444;
  --text: #f1f5f9;
  --muted: #64748b;
  --subtle: #1e2235;
  --radius: 14px;
  --radius-sm: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', system-ui, sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* HEADER */
#header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
  backdrop-filter: blur(10px);
}
#header .logo { display: flex; align-items: center; gap: 10px; }
#header .logo-icon {
  width: 38px; height: 38px; background: var(--accent);
  border-radius: 10px; display: flex; align-items: center;
  justify-content: center; font-size: 20px;
}
#header .logo-text { font-weight: 800; font-size: 15px; }
#header .logo-sub { font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }

/* MAIN */
#main { padding: 74px 16px 90px; max-width: 900px; margin: 0 auto; }

/* BOTTOM NAV */
#bottomnav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
  background: var(--surface); border-top: 1px solid var(--border);
  display: flex; justify-content: space-around;
  padding: 8px 0 max(12px, env(safe-area-inset-bottom));
}
.nav-btn {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  background: none; border: none; cursor: pointer; color: var(--muted);
  padding: 4px 16px; transition: color .2s; min-width: 60px;
}
.nav-btn.active { color: var(--accent); }
.nav-btn svg { width: 22px; height: 22px; }
.nav-btn span { font-size: 10px; font-weight: 600; font-family: 'DM Sans'; }

/* CARDS */
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px; margin-bottom: 12px;
}
.card-title {
  font-size: 11px; color: var(--accent); font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px;
}

/* STAT GRID */
.stat-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 16px; }
.stat-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; text-align: center;
}
.stat-num { font-size: 36px; font-weight: 800; font-family: 'DM Mono'; }
.stat-lbl { font-size: 11px; color: var(--muted); margin-top: 4px; font-weight: 600; }

/* BADGE */
.badge {
  display: inline-block; padding: 2px 10px; border-radius: 6px;
  font-size: 11px; font-weight: 700; font-family: 'DM Mono'; letter-spacing: 1px;
}
.badge-red { background: rgba(239,68,68,.15); color: var(--red); border: 1px solid rgba(239,68,68,.3); }
.badge-yellow { background: rgba(234,179,8,.15); color: var(--yellow); border: 1px solid rgba(234,179,8,.3); }
.badge-green { background: rgba(34,197,94,.15); color: var(--green); border: 1px solid rgba(34,197,94,.3); }

/* PRODUCT ROW */
.prod-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px; background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); margin-bottom: 8px;
  cursor: pointer; transition: all .15s; gap: 10px;
}
.prod-row:active { opacity: .8; }
.prod-stripe { width: 4px; height: 40px; border-radius: 4px; flex-shrink: 0; }
.prod-name { font-weight: 700; font-size: 14px; }
.prod-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.prod-actions { display: flex; gap: 4px; flex-shrink: 0; }

/* BUTTONS */
.btn {
  display: inline-flex; align-items: center; gap: 6px; border: none;
  border-radius: var(--radius-sm); padding: 9px 18px; font-size: 13px;
  font-weight: 700; cursor: pointer; transition: all .15s;
  font-family: 'DM Sans'; white-space: nowrap;
}
.btn:active { transform: scale(.97); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
.btn-danger { background: rgba(239,68,68,.15); color: var(--red); border: 1px solid rgba(239,68,68,.3); }
.btn-ghost { background: transparent; color: var(--muted); }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-icon { padding: 7px; border-radius: 8px; }

/* FORM */
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-label { font-size: 11px; color: var(--muted); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
.form-label .req { color: var(--accent); }
.form-input, .form-select, .form-textarea {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 10px 12px;
  color: var(--text); font-size: 14px; font-family: 'DM Sans';
  outline: none; transition: border-color .2s; width: 100%;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
.form-textarea { resize: vertical; min-height: 70px; }
.form-grid { display: grid; gap: 12px; }
.form-grid-2 { grid-template-columns: 1fr 1fr; }
.form-grid-3 { grid-template-columns: 1fr 1fr 1fr; }
.form-section { margin-bottom: 20px; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.7);
  z-index: 500; display: flex; align-items: flex-end;
  padding: 0;
}
.modal-overlay.center { align-items: center; padding: 16px; }
.modal-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px 20px 0 0; width: 100%; max-height: 92vh;
  overflow-y: auto; padding: 20px 16px 30px;
  animation: slideUp .3s ease;
}
.modal-overlay.center .modal-box { border-radius: 16px; max-width: 560px; animation: fadeIn .2s ease; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
.modal-title { font-size: 17px; font-weight: 800; }

/* TABS */
.tabs { display: flex; gap: 6px; background: var(--subtle); padding: 5px; border-radius: 10px; margin-bottom: 18px; }
.tab-btn {
  flex: 1; padding: 8px; border: none; border-radius: 8px;
  font-size: 12px; font-weight: 700; cursor: pointer;
  background: transparent; color: var(--muted); font-family: 'DM Sans';
  transition: all .2s;
}
.tab-btn.active { background: var(--accent); color: #fff; }

/* SEARCH */
.search-wrap { position: relative; margin-bottom: 12px; }
.search-wrap input { padding-left: 38px; }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }

/* FILTER ROW */
.filter-row { display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px; }
.filter-row select, .filter-row .form-select { min-width: 130px; font-size: 12px; padding: 8px 10px; }

/* TOAST */
#toast {
  position: fixed; top: 70px; left: 50%; transform: translateX(-50%) translateY(-80px);
  background: var(--card); border: 1px solid var(--border);
  border-radius: 30px; padding: 10px 20px; font-size: 13px; font-weight: 700;
  z-index: 1000; transition: transform .3s ease; white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); }

/* DETAIL ROW */
.detail-row {
  display: flex; gap: 10px; padding: 8px 0;
  border-bottom: 1px solid var(--border); align-items: flex-start;
}
.detail-lbl { font-size: 12px; color: var(--muted); font-weight: 600; min-width: 140px; flex-shrink: 0; }
.detail-val { font-size: 13px; color: var(--text); }

/* CHIP */
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 4px 12px; font-size: 12px; margin: 3px;
}
.chip-del { background: none; border: none; color: var(--red); cursor: pointer; font-size: 16px; line-height: 1; padding: 0; }

/* INSTALL BANNER */
#install-banner {
  display: none; position: fixed; bottom: 78px; left: 16px; right: 16px;
  background: linear-gradient(135deg, var(--accent), #f59e0b);
  border-radius: var(--radius); padding: 14px 16px; z-index: 300;
  box-shadow: 0 8px 32px rgba(249,115,22,.4);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{box-shadow:0 8px 32px rgba(249,115,22,.4)} 50%{box-shadow:0 8px 40px rgba(249,115,22,.7)} }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0;transform:scale(.95)} to{opacity:1;transform:scale(1)} }
@keyframes spin { to{transform:rotate(360deg)} }

.install-banner-content { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.install-text { font-weight: 700; font-size: 13px; color: #fff; }
.install-sub { font-size: 11px; color: rgba(255,255,255,.8); margin-top: 2px; }

/* URGENT ROW */
.urgent-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 14px; border-radius: 10px; margin-bottom: 8px;
  cursor: pointer; transition: all .15s; gap: 10px;
}

/* SELECT option */
select option { background: #1a1d27; color: var(--text); }

/* Safe area */
@supports (padding-bottom: env(safe-area-inset-bottom)) {
  #bottomnav { padding-bottom: max(12px, env(safe-area-inset-bottom)); }
}

@media (min-width: 600px) {
  .stat-grid { grid-template-columns: repeat(4,1fr); }
  .form-grid-2 { grid-template-columns: 1fr 1fr; }
}

input[type=date]::-webkit-calendar-picker-indicator { filter: invert(1); opacity:.6; }
input[type=time]::-webkit-calendar-picker-indicator { filter: invert(1); opacity:.6; }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div class="logo">
    <div class="logo-icon">🏪</div>
    <div>
      <div class="logo-text" id="shop-name-display">Deli Manager</div>
      <div class="logo-sub">Gestione Scadenze</div>
    </div>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <span id="header-badge" style="display:none;background:rgba(239,68,68,.2);color:var(--red);border:1px solid rgba(239,68,68,.4);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700"></span>
    <button class="btn btn-primary btn-sm" onclick="openForm()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      Nuovo
    </button>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="page-dashboard"></div>
  <div id="page-products" style="display:none"></div>
  <div id="page-reports" style="display:none"></div>
  <div id="page-settings" style="display:none"></div>
</div>

<!-- BOTTOM NAV -->
<div id="bottomnav">
  <button class="nav-btn active" data-page="dashboard" onclick="navigate('dashboard')">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Home</span>
  </button>
  <button class="nav-btn" data-page="products" onclick="navigate('products')">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    <span>Prodotti</span>
  </button>
  <button class="nav-btn" data-page="reports" onclick="navigate('reports')">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    <span>Report</span>
  </button>
  <button class="nav-btn" data-page="settings" onclick="navigate('settings')">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    <span>Impost.</span>
  </button>
</div>

<!-- INSTALL BANNER -->
<div id="install-banner">
  <div class="install-banner-content">
    <div>
      <div class="install-text">📲 Installa l'app sul tuo telefono!</div>
      <div class="install-sub">Accedi offline in qualsiasi momento</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-sm" style="background:rgba(255,255,255,.25);color:#fff;border:1px solid rgba(255,255,255,.4)" onclick="installApp()">Installa</button>
      <button class="btn btn-sm btn-icon" style="background:rgba(0,0,0,.2);color:#fff;border:none" onclick="document.getElementById('install-banner').style.display='none'">✕</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast">✅ Salvato!</div>

<!-- MODALS placeholder -->
<div id="modal-container"></div>

<script>
// ═══════════════════════════════════════════════════════
// DATA & STORAGE
// ═══════════════════════════════════════════════════════
const S = {
  get: (k, d) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch { return d; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
};

const DEF_CATEGORIES = {
  settori: ['Gastronomia','Latticini','Bevande','Surgelati','Panetteria','Macelleria','Pescheria'],
  famiglie: {
    Gastronomia:['Salumi','Pasta pronta','Insalate'],
    Latticini:['Formaggi','Yogurt','Burro','Panna'],
    Bevande:['Succhi','Acqua','Birra','Vino'],
    Surgelati:['Verdure','Pesce','Carne','Pizze'],
    Panetteria:['Pane','Paste','Biscotti'],
    Macelleria:['Bovino','Suino','Pollame'],
    Pescheria:['Pesce fresco','Molluschi','Crostacei']
  },
  sottofamiglie: {
    Salumi:['Prosciutto crudo','Prosciutto cotto','Salame','Mortadella'],
    Formaggi:['Freschi','Stagionati','Semistagionati','Fusi'],
    Yogurt:['Bianco','Alla frutta','Greco'],
    Pane:['Bianco','Integrale','Speciale']
  }
};
const DEF_ALERTS = [
  {id:'a1',giorni:7,ora:'08:00',attivo:true,label:'1 settimana prima'},
  {id:'a2',giorni:3,ora:'08:00',attivo:true,label:'3 giorni prima'},
  {id:'a3',giorni:1,ora:'08:00',attivo:true,label:'1 giorno prima'},
  {id:'a4',giorni:0,ora:'08:00',attivo:true,label:'Giorno stesso'}
];

let products = S.get('products', []);
let categories = S.get('categories', DEF_CATEGORIES);
let alerts = S.get('alerts', DEF_ALERTS);
let shopName = S.get('shopName', 'Deli Manager');
let currentPage = 'dashboard';
let editingId = null;

function save() { S.set('products',products); }
function saveAlerts() { S.set('alerts',alerts); }
function saveCategories() { S.set('categories',categories); }
function saveShop() { S.set('shopName',shopName); }

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
function uuid() { return crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36)+Math.random().toString(36).slice(2); }
function todayStr() { return new Date().toISOString().split('T')[0]; }
function daysLeft(d) { if(!d) return 9999; return Math.ceil((new Date(d)-new Date(todayStr()))/86400000); }
function fmtDate(d) { if(!d) return '—'; const [y,m,g]=d.split('-'); return `${g}/${m}/${y}`; }
function statusColor(days) { if(days<0) return '#ef4444'; if(days<=3) return '#eab308'; return '#22c55e'; }
function statusLabel(days) { if(days<0) return 'SCADUTO'; if(days===0) return 'SCADE OGGI'; if(days===1) return 'DOMANI'; return days+' giorni'; }
function badgeClass(days) { if(days<0) return 'badge-red'; if(days<=3) return 'badge-yellow'; return 'badge-green'; }
function badge(days) { return `<span class="badge ${badgeClass(days)}">${statusLabel(days)}</span>`; }
function emptyProd() {
  return {id:uuid(),nomeProdotto:'',codiceABarre:'',qrCode:'',codiceSKU:'',descrizione:'',
    settore:'',famiglia:'',sottofamiglia:'',dataProduzione:'',dataScadenza:'',
    dataApertura:'',giorniVitaDopoApertura:'',fornitore:'',numeroFattura:'',
    dataFattura:'',numeroLotto:'',quantitaRicevuta:'',unitaMisura:'pz',prezzoUnitario:'',
    posizioneInterna:'',quantitaAttuale:'',quantitaMinima:'',note:'',
    dataInserimento:todayStr(),ultimaModifica:todayStr()};
}

// ═══════════════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════════════
function playAlert(vol=0.6) {
  try {
    const ctx = new(window.AudioContext||window.webkitAudioContext)();
    [[523.25,0],[659.25,.15],[783.99,.3],[1046.5,.45]].forEach(([f,t])=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value=f; o.type='sine';
      g.gain.setValueAtTime(0,ctx.currentTime+t);
      g.gain.linearRampToValueAtTime(vol,ctx.currentTime+t+.05);
      g.gain.linearRampToValueAtTime(0,ctx.currentTime+t+.25);
      o.start(ctx.currentTime+t); o.stop(ctx.currentTime+t+.3);
    });
  } catch(e){}
}

// ═══════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2800);
}

// ═══════════════════════════════════════════════════════
// NAVIGATE
// ═══════════════════════════════════════════════════════
function navigate(page) {
  currentPage = page;
  document.querySelectorAll('#page-dashboard,#page-products,#page-reports,#page-settings').forEach(el=>el.style.display='none');
  document.getElementById('page-'+page).style.display='block';
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.page===page));
  renderPage(page);
  updateHeaderBadge();
}

function updateHeaderBadge() {
  const b = document.getElementById('header-badge');
  const n = products.filter(p=>daysLeft(p.dataScadenza)<0).length;
  if(n>0){b.textContent=n+' scaduti';b.style.display='inline';}else{b.style.display='none';}
  document.getElementById('shop-name-display').textContent = shopName;
}

function renderPage(page) {
  if(page==='dashboard') renderDashboard();
  if(page==='products') renderProducts();
  if(page==='reports') renderReports();
  if(page==='settings') renderSettings();
}

// ═══════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════
function renderDashboard() {
  const el = document.getElementById('page-dashboard');
  const scaduti = products.filter(p=>daysLeft(p.dataScadenza)<0).length;
  const oggi = products.filter(p=>daysLeft(p.dataScadenza)===0).length;
  const settimana = products.filter(p=>{const d=daysLeft(p.dataScadenza);return d>0&&d<=7;}).length;
  const urgent = [...products].filter(p=>daysLeft(p.dataScadenza)<=7).sort((a,b)=>daysLeft(a.dataScadenza)-daysLeft(b.dataScadenza));

  el.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <div>

let prodSearch='', prodSettore='', prodStato='', prodSort='dataScadenza';

function renderProducts() {
  const el = document.getElementById('page-products');
  let list = [...products];
  if(prodSearch) list=list.filter(p=>
    (p.nomeProdotto||'').toLowerCase().includes(prodSearch.toLowerCase())||
    (p.fornitore||'').toLowerCase().includes(prodSearch.toLowerCase())||
    (p.codiceABarre||'').includes(prodSearch)||(p.codiceSKU||'').includes(prodSearch)
  );
  if(prodSettore) list=list.filter(p=>p.settore===prodSettore);
  if(prodStato==='scaduto') list=list.filter(p=>daysLeft(p.dataScadenza)<0);
  if(prodStato==='urgente') list=list.filter(p=>{const d=daysLeft(p.dataScadenza);return d>=0&&d<=3;});
  if(prodStato==='ok') list=list.filter(p=>daysLeft(p.dataScadenza)>3);
  list.sort((a,b)=>{
    if(prodSort==='dataScadenza') return daysLeft(a.dataScadenza)-daysLeft(b.dataScadenza);
    if(prodSort==='nome') return (a.nomeProdotto||'').localeCompare(b.nomeProdotto||'');
    if(prodSort==='fornitore') return (a.fornitore||'').localeCompare(b.fornitore||'');
    return 0;
  });

  el.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h1 style="font-size:22px;font-weight:800">Prodotti</h1>
      <button class="btn btn-primary btn-sm" onclick="openForm()">+ Aggiungi</button>
    </div>
    <div class="search-wrap">
      <svg class="search-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="form-input" placeholder="Cerca nome, codice, fornitore..." value="${prodSearch}" oninput="prodSearch=this.value;renderProducts()" style="padding-left:38px"/>
    </div>
    <div class="filter-row">
      <select class="form-select" onchange="prodSettore=this.value;renderProducts()">
        <option value="">Tutti i Settori</option>
        ${categories.settori.map(s=>`<option value="${s}" ${prodSettore===s?'selected':''}>${s}</option>`).join('')}
      </select>
      <select class="form-select" onchange="prodStato=this.value;renderProducts()">
        <option value="">Tutti gli stati</option>
        <option value="scaduto" ${prodStato==='scaduto'?'selected':''}>Scaduti</option>
        <option value="urgente" ${prodStato==='urgente'?'selected':''}>Urgenti ≤3gg</option>
        <option value="ok" ${prodStato==='ok'?'selected':''}>OK</option>
      </select>
      <select class="form-select" onchange="prodSort=this.value;renderProducts()">
        <option value="dataScadenza">Scadenza ↑</option>
        <option value="nome">Nome A-Z</option>
        <option value="fornitore">Fornitore</option>
      </select>
    </div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:10px">${list.length} prodotti</div>
    ${list.length===0 ? '<div class="card" style="text-align:center;padding:40px"><div style="font-size:32px;margin-bottom:8px">📦</div><div style="color:var(--muted)">Nessun prodotto trovato</div></div>' : ''}
    ${list.map(p=>{
      const d=daysLeft(p.dataScadenza), col=statusColor(d);
      const sub=[p.settore,p.famiglia,p.fornitore].filter(Boolean).join(' · ');
      return `<div class="prod-row" onclick="openDetail('${p.id}')">
        <div class="prod-stripe" style="background:${col}"></div>
        <div style="flex:1;min-width:0">
          <div class="prod-name">${p.nomeProdotto||'—'}</div>
          <div class="prod-sub">${sub||'—'}${p.codiceABarre?` · <span style="font-family:DM Mono">${p.codiceABarre}</span>`:''}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
          ${badge(d)}
          <div style="font-size:11px;color:var(--muted)">${fmtDate(p.dataScadenza)}</div>
        </div>
        <div class="prod-actions" onclick="event.stopPropagation()">
          <button class="btn btn-ghost btn-icon btn-sm" onclick="openForm('${p.id}')" title="Modifica">✏️</button>
          <button class="btn btn-ghost btn-icon btn-sm" onclick="if(confirm('Eliminare?')){deleteProduct('${p.id}')}" title="Elimina" style="color:var(--red)">🗑️</button>
        </div>
      </div>`;
    }).join('')}
  `;
}

let reportRange = 7;
function renderReports() {
  const el = document.getElementById('page-reports');
  const scaduti = products.filter(p=>daysLeft(p.dataScadenza)<0);
  const inScadenza = products.filter(p=>{const d=daysLeft(p.dataScadenza);return d>=0&&d<=reportRange;});

  function section(title, list, color) {
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:10px;height:10px;background:${color};border-radius:50%"></div>
          <span style="font-weight:700;font-size:14px">${title}</span>
          <span style="background:${color}22;color:${color};font-size:11px;font-weight:700;padding:2px 8px;border-radius:12px">${list.length}</span>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="exportCSV(${JSON.stringify(list).replace(/"/g,'&quot;')},'${title}')">⬇ CSV</button>
      </div>
      ${list.length===0?`<div style="color:var(--muted);font-size:13px;text-align:center;padding:16px 0">Nessun prodotto</div>`:
      list.map(p=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);align-items:center">
        <div>
          <div style="font-weight:600;font-size:13px">${p.nomeProdotto}</div>
          <div style="font-size:11px;color:var(--muted)">${p.fornitore||'—'} ${p.numeroFattura?'· Fatt. '+p.numeroFattura:''}</div>
        </div>
        ${badge(daysLeft(p.dataScadenza))}
      </div>`).join('')}
    </div>`;
  }

  el.innerHTML = `
    <h1 style="font-size:22px;font-weight:800;margin-bottom:16px">Report Scadenze</h1>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <label style="font-size:13px;color:var(--muted)">Mostra entro:</label>
      <select class="form-select" style="width:auto" onchange="reportRange=+this.value;renderReports()">
        ${[1,3,7,14,30].map(n=>`<option value="${n}" ${reportRange===n?'selected':''}>${n} giorni</option>`).join('')}
      </select>
    </div>
    ${section('Prodotti Scaduti',scaduti,'#ef4444')}
    ${section('In scadenza entro '+reportRange+' giorni',inScadenza,'#eab308')}
  `;
}

function exportCSV(list, name) {
  const hdr = ['Nome','Scadenza','Fornitore','Settore','Famiglia','SKU','N°Fattura','Lotto','Posizione','Note'];
  const rows = list.map(p=>[p.nomeProdotto,p.dataScadenza,p.fornitore,p.settore,p.famiglia,p.codiceSKU,p.numeroFattura,p.numeroLotto,p.posizioneInterna,p.note]);
  const csv = [hdr,...rows].map(r=>r.map(c=>`"${(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=name+'.csv'; a.click();
}

function addAlert() { alerts.push({id:uuid(),giorni:1,ora:'08:00',attivo:true,label:'Nuovo alert'}); saveAlerts(); renderSettingsTab(); }
function updateAlert(id,k,v) { alerts=alerts.map(a=>a.id===id?{...a,[k]:v}:a); saveAlerts(); }
function removeAlert(id) { alerts=alerts.filter(a=>a.id!==id); saveAlerts(); renderSettingsTab(); }

// CATEGORIES MANAGEMENT
// ═══════════════════════════════════════════════════════
function addSettore() {
  const v=document.getElementById('new-settore')?.value?.trim(); if(!v) return;
  if(!categories.settori.includes(v)){categories.settori.push(v); categories.famiglie[v]=[];}
  saveCategories(); renderSettingsTab();
}
function removeSettore(s) { categories.settori=categories.settori.filter(x=>x!==s); delete categories.famiglie[s]; saveCategories(); renderSettingsTab(); }
function addFamiglia() {
  const s=document.getElementById('fam-settore')?.value, n=document.getElementById('new-famiglia')?.value?.trim();
  if(!s||!n) return;
  if(!categories.famiglie[s]) categories.famiglie[s]=[];
  if(!categories.famiglie[s].includes(n)){ categories.famiglie[s].push(n); categories.sottofamiglie[n]=[];}
  saveCategories(); renderSettingsTab();
}
function removeFamiglia(s,f) { categories.famiglie[s]=categories.famiglie[s].filter(x=>x!==f); saveCategories(); renderSettingsTab(); }
function addSottofamiglia() {
  const f=document.getElementById('sotto-famiglia')?.value, n=document.getElementById('new-sotto')?.value?.trim();
  if(!f||!n) return;
  if(!categories.sottofamiglie[f]) categories.sottofamiglie[f]=[];
  if(!categories.sottofamiglie[f].includes(n)) categories.sottofamiglie[f].push(n);
  saveCategories(); renderSettingsTab();
}
function removeSottofamiglia(f,s) { categories.sottofamiglie[f]=categories.sottofamiglie[f].filter(x=>x!==s); saveCategories(); renderSettingsTab(); }

          </div>
        </div>

        <!-- CLASSIFICAZIONE -->
        <div class="form-section">
          <div class="card-title">🗂️ Classificazione</div>
          <div class="form-grid form-grid-3">
            <div class="form-group">
              <label class="form-label">Settore</label>
              <select class="form-select" id="f-settore" onchange="onSettoreChange()">
                <option value="">— Seleziona —</option>
                ${categories.settori.map(s=>`<option value="${s}" ${p.settore===s?'selected':''}>${s}</option>`).join('')}
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Famiglia</label>
              <select class="form-select" id="f-famiglia" onchange="onFamigliaChange()">
                <option value="">— Seleziona —</option>
                ${famiglie.map(f=>`<option value="${f}" ${p.famiglia===f?'selected':''}>${f}</option>`).join('')}
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Sottofamiglia</label>
              <select class="form-select" id="f-sotto">
                <option value="">— Seleziona —</option>
                ${sottofamiglie.map(s=>`<option value="${s}" ${p.sottofamiglia===s?'selected':''}>${s}</option>`).join('')}
              </select>
            </div>
          </div>
        </div>

        <!-- DATE -->
        <div class="form-section">
          <div class="card-title">📅 Date</div>
          <div class="form-grid form-grid-2">
            <div class="form-group">
              <label class="form-label">Data Produzione</label>
              <input type="date" class="form-input" id="f-dprod" value="${p.dataProduzione||''}"/>
            </div>
            <div class="form-group">
              <label class="form-label">Data Scadenza <span class="req">*</span></label>
              <input type="date" class="form-input" id="f-dscad" value="${p.dataScadenza||''}"/>
            </div>
            <div class="form-group">
              <label class="form-label">Data Apertura</label>
              <input type="date" class="form-input" id="f-dapert" value="${p.dataApertura||''}"/>
            </div>
            <div class="form-group">
              <label class="form-label">Giorni vita dopo apertura</label>
              <input type="number" class="form-input" id="f-vita" value="${p.giorniVitaDopoApertura||''}"/>
            </div>
          </div>
        </div>

        <!-- FORNITORE -->
        <div class="form-section">
          <div class="card-title">🏭 Fornitore & Fattura</div>
          <div class="form-grid form-grid-3">
            <div class="form-group">
              <label class="form-label">Fornitore</label>
              <input class="form-input" id="f-forn" value="${p.fornitore||''}"/>
            </div>
            <div class="form-group">
              <label class="form-label">N° Fattura</label>
              <input class="form-input" id="f-fatt" value="${p.numeroFattura||''}"/>
            </div>
            <div class="form-group">
              <label class="form-label">Data Fattura</label>
              <input type="date" class="form-input" id="f-dfatt" value="${p.dataFattura||''}"/>
            </div>
          </div>
        </div>

        <!-- MAGAZZINO -->
        <div class="form-section">
          <div class="card-title">📊 Magazzino</div>
          <div class="form-grid" style="grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:10px;margin-bottom:10px">
            <div class="form-group">
              <label class="form-label">Posizione</label>
              <input class="form-input" id="f-pos" value="${p.posizioneInterna||''}" placeholder="es. Frigo 1"/>
            </div>
            <div class="form-group">
              <label class="form-label">Qta Ricevuta</label>
              <input type="number" class="form-input" id="f-qtar" value="${p.quantitaRicevuta||''}"/>
            </div>
            <div class="form-group">
              <label class="form-label">U.M.</label>
              <select class="form-select" id="f-um">
                ${['pz','kg','g','l','ml','cf'].map(u=>`<option ${p.unitaMisura===u?'selected':''}>${u}</option>`).join('')}
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Qta Attuale</label>
              <input type="number" class="form-input" id="f-qtaa" value="${p.quantitaAttuale||''}"/>
            </div>
            <div class="form-group">
              <label class="form-label">Qta Min.</label>
              <input type="number" class="form-input" id="f-qtam" value="${p.quantitaMinima||''}"/>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Prezzo Unitario €</label>
            <input type="number" class="form-input" id="f-prezzo" value="${p.prezzoUnitario||''}" style="max-width:160px"/>
          </div>
        </div>

        <!-- NOTE -->
        <div class="form-group" style="margin-bottom:20px">
          <label class="form-label">Note</label>
          <textarea class="form-textarea" id="f-note" rows="2">${p.note||''}</textarea>
        </div>

        <div style="display:flex;gap:10px;justify-content:flex-end">
          <button class="btn btn-secondary" onclick="closeModal('form-overlay')">Annulla</button>
          ${id?`<button class="btn btn-secondary" onclick="duplicateFromForm()">📋 Duplica</button>`:''}
          <button class="btn btn-primary" onclick="saveForm('${p.id}')">✅ Salva</button>
        </div>
      </div>
    </div>
  `;

  // Make overlay center on tablet+
  if(window.innerWidth>600) document.getElementById('form-overlay').classList.add('center');
}

function onSettoreChange() {
  const s = document.getElementById('f-settore')?.value;
  const fams = s ? (categories.famiglie[s]||[]) : [];
  const sel = document.getElementById('f-famiglia');
  if(sel){sel.innerHTML='<option value="">— Seleziona —</option>'+fams.map(f=>`<option>${f}</option>`).join('');}
  const sel2 = document.getElementById('f-sotto');
  if(sel2){sel2.innerHTML='<option value="">— Seleziona —</option>';}
}
function onFamigliaChange() {
  const f = document.getElementById('f-famiglia')?.value;
  const subs = f ? (categories.sottofamiglie[f]||[]) : [];
  const sel = document.getElementById('f-sotto');
  if(sel){sel.innerHTML='<option value="">— Seleziona —</option>'+subs.map(s=>`<option>${s}</option>`).join('');}
}

function saveForm(id) {
  const nome = document.getElementById('f-nome')?.value?.trim();
  const scad = document.getElementById('f-dscad')?.value;
  if(!nome){showToast('⚠️ Inserisci il nome prodotto!');return;}
  if(!scad){showToast('⚠️ Inserisci la data di scadenza!');return;}

  const p = {
    id, nomeProdotto:nome, codiceABarre:document.getElementById('f-barcode')?.value||'',
    qrCode:document.getElementById('f-qr')?.value||'', codiceSKU:document.getElementById('f-sku')?.value||'',
    descrizione:document.getElementById('f-desc')?.value||'', settore:document.getElementById('f-settore')?.value||'',
    famiglia:document.getElementById('f-famiglia')?.value||'', sottofamiglia:document.getElementById('f-sotto')?.value||'',
    dataProduzione:document.getElementById('f-dprod')?.value||'', dataScadenza:scad,
    dataApertura:document.getElementById('f-dapert')?.value||'', giorniVitaDopoApertura:document.getElementById('f-vita')?.value||'',
    fornitore:document.getElementById('f-forn')?.value||'', numeroFattura:document.getElementById('f-fatt')?.value||'',
    dataFattura:document.getElementById('f-dfatt')?.value||'', numeroLotto:document.getElementById('f-lotto')?.value||'',
    quantitaRicevuta:document.getElementById('f-qtar')?.value||'', unitaMisura:document.getElementById('f-um')?.value||'pz',
    prezzoUnitario:document.getElementById('f-prezzo')?.value||'', posizioneInterna:document.getElementById('f-pos')?.value||'',
    quantitaAttuale:document.getElementById('f-qtaa')?.value||'', quantitaMinima:document.getElementById('f-qtam')?.value||'',
    note:document.getElementById('f-note')?.value||'', ultimaModifica:todayStr(),
    dataInserimento: (editingId ? (products.find(x=>x.id===id)||{}).dataInserimento : null) || todayStr()
  };

  const idx = products.findIndex(x=>x.id===id);
  if(idx>=0) products[idx]=p; else products.push(p);
  save(); closeModal('form-overlay'); renderPage(currentPage); updateHeaderBadge();
  showToast('✅ Prodotto salvato!');
}

function duplicateFromForm() {
  const id = document.getElementById('f-barcode')?.closest('.modal-overlay')?.querySelector('[onclick*="saveForm"]')?.getAttribute('onclick')?.match(/'(.+)'/)?.[1];
  closeModal('form-overlay');
  if(id){const p=products.find(x=>x.id===id);if(p)duplicateProduct(p);}
}

// ═══════════════════════════════════════════════════════
// DETAIL MODAL
// ═══════════════════════════════════════════════════════
function openDetail(id) {
  const p = products.find(x=>x.id===id);
  if(!p) return;
  const d = daysLeft(p.dataScadenza);
  const rows = [
    ['Nome',p.nomeProdotto],['Codice a Barre',p.codiceABarre],['QR Code',p.qrCode],
    ['SKU',p.codiceSKU],['Lotto',p.numeroLotto],['Settore',p.settore],
    ['Famiglia',p.famiglia],['Sottofamiglia',p.sottofamiglia],
    ['Data Produzione',fmtDate(p.dataProduzione)],['Data Scadenza',fmtDate(p.dataScadenza)],
    ['Data Apertura',fmtDate(p.dataApertura)],['Giorni vita dopo apertura',p.giorniVitaDopoApertura],
    ['Fornitore',p.fornitore],['N° Fattura',p.numeroFattura],['Data Fattura',fmtDate(p.dataFattura)],
    ['Quantità Ricevuta',p.quantitaRicevuta?`${p.quantitaRicevuta} ${p.unitaMisura}`:''],
    ['Quantità Attuale',p.quantitaAttuale],['Quantità Minima',p.quantitaMinima],
    ['Prezzo Unitario',p.prezzoUnitario?`€ ${p.prezzoUnitario}`:''],
    ['Posizione',p.posizioneInterna],['Note',p.note],
    ['Inserimento',fmtDate(p.dataInserimento)],['Ultima Modifica',fmtDate(p.ultimaModifica)]
  ].filter(([,v])=>v);

  const mc = document.getElementById('modal-container');
  mc.innerHTML += `
    <div class="modal-overlay center" id="detail-overlay" onclick="if(event.target===this)closeModal('detail-overlay')">
      <div class="modal-box">
        <div class="modal-header">
          <div class="modal-title">${p.nomeProdotto}</div>
          <button class="btn btn-ghost btn-icon" onclick="closeModal('detail-overlay')">✕</button>
        </div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
          ${badge(d)}
          <span style="font-size:12px;color:var(--muted)">Scadenza: ${fmtDate(p.dataScadenza)}</span>
        </div>
        ${rows.map(([l,v])=>`<div class="detail-row"><div class="detail-lbl">${l}</div><div class="detail-val">${v}</div></div>`).join('')}
        <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end;flex-wrap:wrap">
          <button class="btn btn-secondary btn-sm" onclick="duplicateProduct(products.find(x=>x.id==='${id}'));closeModal('detail-overlay')">📋 Duplica</button>
          <button class="btn btn-secondary btn-sm" onclick="closeModal('detail-overlay');openForm('${id}')">✏️ Modifica</button>
          <button class="btn btn-danger btn-sm" onclick="if(confirm('Eliminare?')){deleteProduct('${id}');closeModal('detail-overlay')}">🗑️ Elimina</button>
        </div>
      </div>
    </div>
  `;
}

function closeModal(id) { const el=document.getElementById(id); if(el) el.remove(); }

// ═══════════════════════════════════════════════════════
// BARCODE SCANNER (simulato - in produzione usa html5-qrcode)
// ═══════════════════════════════════════════════════════
function scanCode(targetId) {
  if('BarcodeDetector' in window) {
    // Usa BarcodeDetector API nativa se disponibile
    const video = document.createElement('video');
    const canvas = document.createElement('canvas');
    navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}).then(stream=>{
      video.srcObject=stream; video.play();
      const detector = new BarcodeDetector({formats:['ean_13','ean_8','upc_a','upc_e','qr_code','code_128']});
      const interval = setInterval(async()=>{
        try {
          canvas.width=video.videoWidth; canvas.height=video.videoHeight;
          canvas.getContext('2d').drawImage(video,0,0);
          const codes = await detector.detect(canvas);
          if(codes.length>0){
            clearInterval(interval); stream.getTracks().forEach(t=>t.stop());
            const el=document.getElementById(targetId); if(el){el.value=codes[0].rawValue;}
            showToast('✅ Codice rilevato: '+codes[0].rawValue);
          }
        }catch(e){}
      },300);
      setTimeout(()=>{clearInterval(interval);stream.getTracks().forEach(t=>t.stop());},15000);
    }).catch(()=>manualCode(targetId));
  } else {
    manualCode(targetId);
  }
}
function manualCode(targetId) {
  const code = prompt('📷 Fotocamera non disponibile.\nInserisci il codice manualmente:');
  if(code){const el=document.getElementById(targetId);if(el)el.value=code.trim();}
}

// ═══════════════════════════════════════════════════════
// BACKUP
// ═══════════════════════════════════════════════════════
function exportBackup() {
  const data = {products,categories,alerts,shopName};
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=`backup-scadenze-${todayStr()}.json`; a.click();
}
function importBackup(input) {
  const file=input.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=ev=>{
    try {
      const d=JSON.parse(ev.target.result);
      if(d.products){products=d.products;save();}
      if(d.categories){categories=d.categories;saveCategories();}
      if(d.alerts){alerts=d.alerts;saveAlerts();}
      if(d.shopName){shopName=d.shopName;saveShop();}
      showToast('✅ Backup ripristinato!');
      renderPage(currentPage); updateHeaderBadge();
    }catch{showToast('❌ File non valido');}
  };
  r.readAsText(file);
}

// ═══════════════════════════════════════════════════════
// ALERT CHECKER (ogni minuto)
// ═══════════════════════════════════════════════════════
setInterval(()=>{
  const now=new Date();
  const hhmm=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  alerts.filter(a=>a.attivo&&a.ora===hhmm).forEach(a=>{
    const urgent=products.filter(p=>daysLeft(p.dataScadenza)===a.giorni);
    if(urgent.length>0){
      playAlert();
      showToast(`⏰ ${a.label}: ${urgent.length} prodotto/i!`);
      if('Notification' in window && Notification.permission==='granted'){
        new Notification('🏪 Deli Manager', {body:`${a.label}: ${urgent.length} prodotto/i in scadenza!`,icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🏪</text></svg>'});
      }
    }
  });
},60000);

let deferredPrompt;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault(); deferredPrompt=e;
  document.getElementById('install-banner').style.display='block';
});
function installApp() {
  if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById('install-banner').style.display='none';});}
  else{alert('Per installare:\n1. Apri in Chrome\n2. Menu ⋮ → "Aggiungi a schermata Home"');}
}

// ═══════════════════════════════════════════════════════
// SERVICE WORKER (inline via Blob)
// ═══════════════════════════════════════════════════════
if('serviceWorker' in navigator) {
  const sw=`
    const CACHE='scadenze-deli-v1';
    const ASSETS=['/'];
    self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS))));
    self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('/')))));
  `;
  const blob=new Blob([sw],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
